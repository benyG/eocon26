services:
  app:
    build: .
    container_name: eocon_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    # Not exposed publicly — Caddy proxies internally
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: eocon_caddy
    restart: unless-stopped
    ports:
    - "8080:80"
    - "3000:443"
    - "3000:443/udp"   # HTTP/3
    environment:
      DOMAIN: test.eyesopensecurity.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certificates (persisted)
      - caddy_config:/config    # caddy config cache
    networks:
      - web
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
