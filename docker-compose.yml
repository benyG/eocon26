services:
  app:
    build: .
    container_name: eocon_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcs-service-account.json
    volumes:
      # Mount GCS credentials — must be readable by uid 1001 (nextjs user)
      # Run on host: chmod 644 /opt/eocon/gcs-service-account.json
      - /opt/eocon/gcs-service-account.json:/app/gcs-service-account.json:ro
    # Not exposed publicly — Caddy proxies internally
    expose:
      - "3000"
    networks:
      - web

  caddy:
    image: caddy:2-alpine
    container_name: eocon_caddy
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DOMAIN: test.eyesopensecurity.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:

networks:
  web:
